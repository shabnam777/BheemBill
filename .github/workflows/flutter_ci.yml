name: Flutter CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write # needed to auto-commit version bump + create GitHub Releases

jobs:
  build:
    name: Analyze, Test, Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      # Automatically bumps patch version + build number in pubspec.yaml
      # e.g. 1.0.0+1 -> 1.0.1+2 — no manual editing needed anymore.
      - name: Auto-bump version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD_NUM=$(echo "$CURRENT" | cut -d'+' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUM + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "Bumped version: $CURRENT -> $NEW_VERSION"

      # Commits the bumped pubspec.yaml back to the repo so it's
      # reflected in git history. [skip ci] prevents an infinite loop.
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: auto-bump version [skip ci]" || echo "No changes to commit"
          git push

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # Re-read the (now bumped) version for the release tag + email
      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION-run${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp build/app/outputs/flutter-apk/app-release.apk \
             release-output/billing_app-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Billing App ${{ steps.version.outputs.version }}"
          body: |
            Automated build from commit ${{ github.sha }}.
            Download the APK below and install it to update.
          files: release-output/*.apk

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Billing App - New Update Available (v${{ steps.version.outputs.version }})"
          to: ${{ secrets.EMAIL_TO }}
          from: Billing App CI
          body: |
            A new version of Billing App has been built and released.

            Version: ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
            Download APK: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}

            Install the APK on your device to update to the latest version.
