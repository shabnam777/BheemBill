name: Build, Release & Notify

on:
  push:
    branches: [main]

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  release:
    name: Build APK, Create Release, Send Email
    runs-on: ubuntu-latest
    permissions:
    contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      # Read version from pubspec.yaml (e.g. 1.0.0+1)
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION-run${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp build/app/outputs/flutter-apk/app-release.apk \
             release-output/billing_app-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Billing App ${{ steps.version.outputs.version }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: release-output/*.apk

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Billing App - New Update Available (v${{ steps.version.outputs.version }})"
          to: ${{ secrets.EMAIL_TO }}
          from: Billing App CI
          body: |
            A new version of Billing App has been released.

            Version: ${{ steps.version.outputs.version }}
            Download: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}
