name: billing_app
description: Flutter billing app with PDF bill generation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.4
  intl: ^0.19.0
  uuid: ^4.4.2
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
